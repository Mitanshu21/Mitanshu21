name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Serves the site at mitanshu21.github.io/<repo-name>.
          # Remove this env var if the repo is ever renamed to mitanshu21.github.io.
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      # Publishing to the gh-pages branch auto-enables GitHub Pages —
      # no repo-settings access needed.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
